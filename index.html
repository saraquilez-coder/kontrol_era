<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#d32f2f">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/784/784332.png">
    <link rel="stylesheet" href="style.css">
    <title>KONTROL_ERA BVG</title>
</head>
<body>

    <div class="header">
        <h1>KONTROL_ERA</h1>
        <div id="display-intervencion" style="display:none;" class="info-header">
            <b id="txt-int-nom"></b><br>
            <span id="txt-int-dir" style="font-size:0.8rem; opacity:0.8;"></span>
        </div>
    </div>

    <div id="timer-box"></div>

    <div id="setup-intervencion" class="form-zona">
        <label>Intervención</label>
        <input type="text" id="int-nom" placeholder="Ej: Incendio Vivienda">
        <label>Dirección</label>
        <input type="text" id="int-dir" placeholder="Ej: Portal de Foronda, 12">
        <button class="btn btn-green" onclick="iniciarIntervencion()">INICIAR INTERVENCIÓN</button>
    </div>

    <div id="panel-control">
        <div class="form-zona">
            <input type="text" id="nom" placeholder="Nombre Equipo">
            <input type="number" id="bar" placeholder="Bares Entrada">
            <div class="n-prof-row">
                <input type="number" id="np1" placeholder="Nº Prof 1">
                <input type="number" id="np2" placeholder="Nº Prof 2">
                <input type="number" id="np3" placeholder="Nº Prof 3">
            </div>
            <input type="text" id="sit" placeholder="LOCALIZACIÓN">
            <input type="text" id="obj" placeholder="OBJETIVO">
            <button class="btn btn-blue" onclick="addEquipo()">AÑADIR EQUIPO</button>
        </div>

        <div id="quick-access"></div>
        <div id="L_ZONA"></div>
        <div id="L_FUERA"></div>

        <button class="btn btn-reset" onclick="finalizarTodo()">FINALIZAR INTERVENCIÓN</button>
    </div>

    <div id="modal">
        <div class="modal-content">
            <h2 id="mTit"></h2>
            <div style="text-align: left;">
                <p>Presión Actual (bar):</p>
                <input type="number" id="nB" style="font-size: 2rem; text-align: center;">
                
                <div id="alerta-check-container" style="display:none;">
                    <div class="check-container">
                        <input type="checkbox" id="checkInformado">
                        <label for="checkInformado" style="color:var(--alerta); font-size:1rem; cursor:pointer;"> EQUIPO INFORMADO DE PRESIÓN DE REGRESO</label>
                    </div>
                </div>

                <p>Localización:</p>
                <input type="text" id="nSit">
                <p>Objetivo:</p>
                <input type="text" id="nObj">
            </div>
            <button class="btn btn-blue" onclick="saveData()">GUARDAR DATOS</button>
            <button class="btn btn-dark" onclick="hideModal()">CANCELAR</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
